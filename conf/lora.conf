# =============================================================================
# direwolf.conf — LoRa APRS two-way iGate
# =============================================================================
# Works with lora_kiss_bridge.py which exposes the LoRa radio as a KISS TNC
# via a PTY symlink at /tmp/kiss_lora  (or TCP port 8001 — see below).
#
# Usage:
#   1. Start the bridge:
#        python3 lora_kiss_bridge.py --profile meshadv
#
#   2. Start Direwolf (points at the PTY the bridge created):
#        direwolf -c direwolf.conf
#
# Direwolf docs: https://github.com/wb2osz/direwolf/tree/master/doc
# =============================================================================


# ---------------------------------------------------------------------------
# Station identity — CHANGE THESE
# ---------------------------------------------------------------------------

MYCALL  N0CALL-10          # Your callsign + SSID (SSID -10 = iGate convention)


# ---------------------------------------------------------------------------
# Audio modem — disabled for LoRa (we use a KISS TNC, not audio)
# Set to "null" so Direwolf doesn't try to open a sound card.
# ---------------------------------------------------------------------------

ADEVICE  null null


# ---------------------------------------------------------------------------
# Channel 0 — LoRa APRS via KISS TNC (PTY mode)
#
# The lora_kiss_bridge creates a symlink: /tmp/kiss_lora → /dev/pts/N
# Direwolf opens it as a serial KISS TNC.
#
# If you prefer TCP mode, comment the SERIALKISS line and uncomment KISSPORT.
# ---------------------------------------------------------------------------

CHANNEL 0

  # PTY mode (default) — bridge must be running before Direwolf starts
  SERIALKISS /tmp/kiss_lora 115200

  # TCP mode — uncomment this and comment out SERIALKISS above
  # KISSPORT 8001

  # No MODEM line needed — SERIALKISS replaces the audio modem entirely.
  # Direwolf uses the KISS TNC for both RX and TX on this channel.

  # Transmit PTT — not needed for LoRa (bridge handles TX enable pins via GPIO)
  # PTT  NONE


# ---------------------------------------------------------------------------
# iGate configuration — two-way
# Receives LoRa APRS packets and forwards them to APRS-IS (RX→IS).
# Also gates messages from APRS-IS back out over LoRa RF (IS→RF).
# ---------------------------------------------------------------------------

# APRS-IS server — pick one close to you:
#   rotate.aprs2.net       (auto-selects nearest)
#   noam.aprs2.net         (North America)
#   euro.aprs2.net         (Europe)
#   asia.aprs2.net         (Asia-Pacific)
IGSERVER  rotate.aprs2.net

# APRS-IS port
IGLOGIN  N0CALL-10  YOUR_PASSCODE_HERE
# Generate your passcode: https://apps.magicbug.co.uk/passcode/

# Gate APRS-IS messages back out over LoRa RF to recently heard local stations
IGTXVIA  0  WIDE1-1,WIDE2-1

# Rate-limit RF transmissions to avoid congesting the LoRa channel
IGTXLIMIT  6 10            # max 6 packets per 10 minutes

# Optional: only gate packets heard directly (no-hop) to prevent dupes
# IGFILTER  r/LAT/LON/RADIUS_KM


# ---------------------------------------------------------------------------
# iGate beacon — announces your iGate on the APRS network
# Replace LAT/LON with your actual coordinates (DDmm.mmN / DDDmm.mmW format)
# ---------------------------------------------------------------------------

PBEACON  DELAY=0:30  EVERY=30:00  OVERLAY=R  SYMBOL="igate"  LAT=3730.00N  LONG=12130.00W  COMMENT="LoRa APRS iGate 433.775 MHz SF12 BW125"

# Optionally include altitude (metres above sea level):
# PBEACON  ...  ALT=100  ...


# ---------------------------------------------------------------------------
# Digipeater — optional, enable to relay packets between LoRa stations
# Useful if you want to extend range beyond direct RF coverage.
# ---------------------------------------------------------------------------

# DIGIPEAT  0  0  ^WIDE[3-7]-[3-7]$  ^WIDE[12]-[12]$  TRACE


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

# Log decoded packets to a file (rotate daily with logrotate)
LOGFILE  /tmp/direwolf.log

# Decoded packet display verbosity (1 = normal, 2 = include raw hex)
# Set to 3 for debugging; keep at 1 for production
AGWPORT  0


# ---------------------------------------------------------------------------
# Miscellaneous
# ---------------------------------------------------------------------------

# Suppress duplicate packets received within this window (seconds)
DEDUPE  30

# Filter out packets we transmitted ourselves (avoids echo loop)
FILTER  IG  0  t/m

# End of direwolf.conf
